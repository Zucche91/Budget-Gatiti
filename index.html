<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Budget Famiglia Gatiti</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0F172A;
            --card: rgba(30, 41, 59, 0.7);
            --primary: #38BDF8;
            --success: #22C55E;
            --danger: #EF4444;
            --text-main: #F8FAFC;
            --text-sec: #94A3B8;
            --accent: #818CF8;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; padding: 0; 
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        header { width: 100%; padding: 30px 0 15px; text-align: center; }
        header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }

        .page { display: none; width: 100%; max-width: 480px; padding: 10px 20px 120px; box-sizing: border-box; }
        .page.active { display: block; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { 
            background: var(--card); backdrop-filter: blur(20px); border-radius: 28px; 
            padding: 24px; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 20px 40px rgba(0,0,0,0.3); margin-bottom: 20px; 
        }

        /* Grafico Saldo Ultra-Moderno */
        .chart-wrapper { position: relative; height: 260px; width: 100%; display: flex; align-items: center; justify-content: center; }
        .balance-center {
            position: absolute; text-align: center; pointer-events: none; z-index: 10;
        }
        .balance-center .lbl { font-size: 12px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .balance-center .val { font-size: 36px; font-weight: 800; color: #fff; margin: 4px 0; text-shadow: 0 0 20px rgba(56,189,248,0.4); }

        .month-selector { 
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 14px; 
            border-radius: 16px; font-size: 15px; color: var(--primary); font-weight: 600; width: 100%; outline: none; appearance: none; text-align: center;
        }

        /* Bottoni Azione Stile Moderno */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 25px; }
        .btn-main { 
            border: none; border-radius: 22px; padding: 22px; font-size: 16px; font-weight: 700; 
            color: white; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-plus { background: linear-gradient(135deg, #22C55E 0%, #166534 100%); box-shadow: 0 10px 20px rgba(34,197,94,0.2); }
        .btn-minus { background: linear-gradient(135deg, #EF4444 0%, #991B1B 100%); box-shadow: 0 10px 20px rgba(239,68,68,0.2); }
        .btn-main:active { transform: scale(0.92); filter: brightness(1.2); }
        .btn-icon { font-size: 24px; }

        .section-title { font-size: 17px; font-weight: 700; margin: 25px 0 15px 5px; color: var(--text-main); }

        /* Lista Transazioni */
        .history-list { display: flex; flex-direction: column; gap: 12px; }
        .history-item { 
            display: flex; align-items: center; justify-content: space-between; 
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 20px;
        }
        .item-info { display: flex; align-items: center; gap: 14px; }
        .item-icon { width: 44px; height: 44px; background: rgba(56,189,248,0.1); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .item-name { font-weight: 600; font-size: 15px; }
        .item-date { font-size: 12px; color: var(--text-sec); margin-top: 2px; }
        .item-amount { font-weight: 700; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .del-btn { color: var(--text-sec); background: none; border: none; font-size: 18px; padding: 5px; opacity: 0.5; }

        /* Modale Premium */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: #1E293B; padding: 30px; border-radius: 32px; width: 90%; max-width: 380px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content h3 { margin: 0 0 20px; font-size: 22px; text-align: center; }
        .btn-save { background: var(--primary); color: #0F172A; border: none; padding: 16px; border-radius: 16px; width: 100%; font-weight: 800; font-size: 16px; margin-top: 20px; }

        .tab-bar { 
            position: fixed; bottom: 20px; width: 90%; max-width: 400px; background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 30px;
            display: flex; justify-content: space-around; padding: 15px 0; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .tab-item { border: none; background: none; color: var(--text-sec); font-size: 11px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .tab-item.active { color: var(--primary); }
        .tab-item svg { width: 22px; height: 22px; }
    </style>
</head>
<body>

    <header>
        <h1>Budget Famiglia Gatiti</h1>
    </header>

    <div id="dashboard" class="page active">
        <div class="card" style="padding: 10px 24px 24px;">
            <div class="chart-wrapper">
                <canvas id="balanceChart"></canvas>
                <div class="balance-center">
                    <div class="lbl">Rimanente</div>
                    <div class="val" id="centerBalance">0€</div>
                </div>
            </div>
            <select id="monthFilter" class="month-selector" onchange="update()"></select>
        </div>

        <div class="grid">
            <button class="btn-main btn-plus" onclick="openModal('Entrata')">
                <span class="btn-icon">＋</span>
                <span>ENTRATA</span>
            </button>
            <button class="btn-main btn-minus" onclick="openModal('Uscita')">
                <span class="btn-icon">－</span>
                <span>SPESA</span>
            </button>
        </div>

        <div class="section-title">Spese per Categoria</div>
        <div class="card">
            <canvas id="catBarChart"></canvas>
        </div>

        <div class="section-title">Ultime Transazioni</div>
        <div class="history-list" id="historyList"></div>
    </div>

    <div id="settings" class="page">
        <h2 style="margin: 20px 0;">Impostazioni</h2>
        <div class="card">
            <button class="btn-save" style="background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 10px;" onclick="exportData()">📤 Esporta Backup</button>
            <button class="btn-save" style="background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 10px;" onclick="document.getElementById('fileInput').click()">📥 Importa Backup</button>
            <input type="file" id="fileInput" style="display:none" accept=".json" onchange="importData(event)">
            <button class="btn-save" style="background: #334155; color: #fff;" onclick="exportExcel()">⬇️ Report Excel (.csv)</button>
        </div>
        <div class="card" style="border: 1px solid rgba(239,68,68,0.3);">
            <button class="btn-save" style="background: var(--danger); color: #fff;" onclick="clearAllData()">⚠️ Reset Totale</button>
        </div>
    </div>

    <div id="entryModal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Nuova Spesa</h3>
            <div style="margin-bottom: 20px;">
                <label style="color: var(--text-sec); font-size: 13px;">IMPORTO</label>
                <input type="number" id="entryVal" placeholder="0.00" style="background: transparent; border: none; border-bottom: 2px solid var(--primary); color: #fff; font-size: 32px; width: 100%; padding: 10px 0; outline: none; font-weight: 700;">
            </div>
            <div style="margin-bottom: 20px;">
                <label style="color: var(--text-sec); font-size: 13px;">CATEGORIA</label>
                <select id="entryCat" onchange="checkNewCat(this)" style="background: #334155; border: none; color: #fff; width: 100%; padding: 15px; border-radius: 12px; margin-top: 8px; font-size: 16px;">
                </select>
            </div>
            <button class="btn-save" onclick="saveEntry()">CONFERMA</button>
            <button onclick="closeModal()" style="background:none; border:none; color:var(--text-sec); width:100%; margin-top:15px; font-weight:600;">Annulla</button>
        </div>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" id="btnDash" onclick="switchPage('dashboard')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
            Home
        </button>
        <button class="tab-item" id="btnSett" onclick="switchPage('settings')">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            Impostazioni
        </button>
    </div>

    <script>
        let data = JSON.parse(localStorage.getItem('gatiti_premium_v2')) || [];
        let categories = JSON.parse(localStorage.getItem('gatiti_cats_v2')) || {
            'Entrata': ['Stipendio', 'Regalo', 'Altro'],
            'Uscita': ['Cibo', 'Casa', 'Bollette', 'Auto', 'Svago', 'Salute', 'Spesa']
        };
        const catIcons = { 'Cibo': '🛒', 'Casa': '🏠', 'Bollette': '🔌', 'Auto': '🚗', 'Svago': '🎮', 'Salute': '💊', 'Stipendio': '💰', 'Spesa': '🛍️', 'Regalo': '🎁', 'Altro': '📦' };
        const catColors = ['#38BDF8', '#818CF8', '#FB7185', '#34D399', '#FBBF24', '#A78BFA', '#F472B6'];
        let currentType = '';

        function switchPage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            pId === 'dashboard' ? document.getElementById('btnDash').classList.add('active') : document.getElementById('btnSett').classList.add('active');
        }

        function initMonths() {
            const select = document.getElementById('monthFilter');
            const now = new Date();
            for(let i=0; i<12; i++) {
                let d = new Date(now.getFullYear(), now.getMonth() - i, 1);
                select.innerHTML += `<option value="${d.getFullYear()}-${d.getMonth()}">${d.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' })}</option>`;
            }
        }

        function openModal(type) {
            currentType = type;
            document.getElementById('modalTitle').innerText = 'Nuova ' + type;
            const catSelect = document.getElementById('entryCat');
            catSelect.innerHTML = categories[type].map(c => `<option value="${c}">${c}</option>`).join('') + '<option value="NEW">+ Nuova categoria...</option>';
            document.getElementById('entryModal').style.display = 'flex';
            document.getElementById('entryVal').focus();
        }

        function checkNewCat(sel) {
            if(sel.value === 'NEW') {
                let n = prompt("Nome categoria:");
                if(n) { categories[currentType].unshift(n); localStorage.setItem('gatiti_cats_v2', JSON.stringify(categories)); openModal(currentType); document.getElementById('entryCat').value = n; }
                else sel.selectedIndex = 0;
            }
        }

        function saveEntry() {
            const val = parseFloat(document.getElementById('entryVal').value);
            const cat = document.getElementById('entryCat').value;
            if(!val) return;
            data.push({ type: currentType, val, cat, date: new Date().toISOString() });
            closeModal(); update();
        }

        function closeModal() { document.getElementById('entryModal').style.display = 'none'; document.getElementById('entryVal').value = ''; }
        function deleteItem(i) { if(confirm("Eliminare transazione?")) { data.splice(i, 1); update(); } }

        function update() {
            localStorage.setItem('gatiti_premium_v2', JSON.stringify(data));
            const [y, m] = document.getElementById('monthFilter').value.split('-').map(Number);
            const total = data.reduce((acc, t) => t.type === 'Entrata' ? acc + t.val : acc - t.val, 0);
            document.getElementById('centerBalance').innerText = total.toLocaleString('it-IT') + "€";

            const filtered = data.filter(t => { let d = new Date(t.date); return d.getFullYear() === y && d.getMonth() === m; });
            const list = document.getElementById('historyList');
            list.innerHTML = data.map((t, i) => ({...t, id: i}))
                .filter(t => { let d = new Date(t.date); return d.getFullYear() === y && d.getMonth() === m; })
                .reverse().slice(0, 10).map(t => `
                <div class="history-item">
                    <div class="item-info">
                        <div class="item-icon">${catIcons[t.cat] || '📦'}</div>
                        <div>
                            <div class="item-name">${t.cat}</div>
                            <div class="item-date">${new Date(t.date).toLocaleDateString()}</div>
                        </div>
                    </div>
                    <div class="item-amount" style="color:${t.type==='Entrata'?'var(--success)':'#fff'}">
                        ${t.type==='Entrata'?'+':'-'}${t.val.toFixed(2)}€
                        <button class="del-btn" onclick="deleteItem(${t.id})">×</button>
                    </div>
                </div>`).join('');
            renderCharts(filtered);
        }

        let bChart, cChart;
        function renderCharts(fData) {
            const totals = fData.reduce((acc, t) => { acc[t.type] = (acc[t.type] || 0) + t.val; return acc; }, {});
            const catTotals = fData.filter(t => t.type === 'Uscita').reduce((acc, t) => { acc[t.cat] = (acc[t.cat] || 0) + t.val; return acc; }, {});

            if(bChart) bChart.destroy();
            bChart = new Chart(document.getElementById('balanceChart'), {
                type: 'doughnut',
                data: { labels: ['Entrate', 'Uscite'], datasets: [{ data: [totals['Entrata']||0, totals['Uscita']||0], backgroundColor: ['#22C55E', '#EF4444'], borderWidth: 0, hoverOffset: 4 }] },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });

            if(cChart) cChart.destroy();
            const labels = Object.keys(catTotals);
            cChart = new Chart(document.getElementById('catBarChart'), {
                type: 'bar',
                data: { labels, datasets: [{ data: Object.values(catTotals), backgroundColor: catColors, borderRadius: 12 }] },
                options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#94A3B8' } }, x: { grid: { display: false }, ticks: { color: '#94A3B8' } } } }
            });
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(data)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
            a.download = `backup_gatiti_pro.json`; a.click();
        }

        function importData(event) {
            const reader = new FileReader();
            reader.onload = (e) => { data = JSON.parse(e.target.result); update(); alert("Backup importato con successo!"); };
            reader.readAsText(event.target.files[0]);
        }

        function exportExcel() {
            let csv = "Data,Categoria,Tipo,Importo\n" + data.map(t => `${new Date(t.date).toLocaleDateString()},${t.cat},${t.type},${t.val}`).join('\n');
            const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
            a.download = 'report_gatiti.csv'; a.click();
        }

        function clearAllData() { if(confirm("ATTENZIONE! Vuoi cancellare tutti i dati per sempre?")) { data = []; update(); } }

        initMonths(); update();
    </script>
</body>
</html>
